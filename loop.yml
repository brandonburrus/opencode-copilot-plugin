goal: "logs like `[opencode-copilot-plugin] Hook execution error: Hook timed out after 2s` are appearing in opencode itself, and not being logged properly. Im also seeing logs flash for a second on start up, so logging is not being handled properly somewhere"
status: in_progress
iteration: 1
tasks:
  - id: 1
    description: "Explore all logging calls in the codebase — find every process.stderr.write, console.log/error/warn, and the existing log() helper; understand what each one does and which ones are causing visible UI output"
    status: completed
    result: |
      Found process.stderr.write calls in 7 source files, all potentially surfacing in the OpenCode TUI.
      HIGH RISK (run every startup): src/commands.ts (2 sites), src/instructions.ts (2), src/skills.ts (3),
      src/agents/discovery.ts (5), src/prompts/discovery.ts (2), src/hooks/discovery.ts (5).
      MEDIUM (conditional): src/hooks/executor.ts (3 sites — timeout, hook stderr, spawn error),
      src/prompts/resolve-references.ts (2 sites).
      SAFE: index.ts uses client.app.log which routes to server log file only.
      The log() helper calls client.app.log (POST /log) — safe, never visible in UI.
      The startup flash is from process.stderr.write calls during discovery at init.
      Hook timeout messages appearing in UI are from executor.ts process.stderr.write.
      Fix: introduce a singleton logger in src/log.ts initialized with client.app.log,
      replace all process.stderr.write calls with it across the codebase.
  - id: 2
    description: "Fix logging — create src/log.ts singleton logger initialized with client.app.log, replace all process.stderr.write calls in src/commands.ts, src/instructions.ts, src/skills.ts, src/agents/discovery.ts, src/prompts/discovery.ts, src/hooks/discovery.ts, src/hooks/executor.ts, src/prompts/resolve-references.ts"
    status: completed
    result: "Created src/log.ts singleton with setPluginLogger/pluginLog. Initialized in index.ts at top of factory before any discovery runs. Replaced all 22 process.stderr.write call sites across 8 files with pluginLog('warn',...) / pluginLog('error',...). Only remaining process.stderr.write is the pre-init fallback in src/log.ts itself. Typecheck and build both pass (30 modules, 64.31 KB)."
  - id: 3
    description: "Typecheck, build, verify clean output, commit"
    status: in_progress
    result: ""
context:
