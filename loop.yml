    - Plugin is opencode-copilot-plugin, TypeScript/Bun, built to node target.
    - index.ts has a log() helper that uses client.app.log (POST /log endpoint). Safe — goes to server log file only, never visible in TUI.
    - process.stderr.write in a plugin process writes to the terminal outside the TUI renderer, causing visual artifacts (the "flash").
    - client.app.log is the correct and only safe logging channel.
    - All process.stderr.write calls across 7 source files must be replaced.
